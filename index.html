<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auth App</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <main class="auth-container">
        <div class="auth-card">
            <!-- Login Form -->
            <form class="auth-form active" id="login-form" novalidate>
                <h1>Login</h1>
                <p class="auth-subtitle">Welcome back! Please sign in.</p>

                <div class="field-group">
                    <label for="login-email">Email</label>
                    <input id="login-email" name="email" type="email" placeholder="Enter your email"
                        autocomplete="email" required>
                    <span class="field-error" id="login-email-error"></span>
                </div>

                <div class="field-group">
                    <label for="login-password">Password</label>
                    <div class="password-field">
                        <input id="login-password" name="password" type="password" placeholder="Enter your password"
                            autocomplete="current-password" required>
                        <button type="button" class="toggle-password" aria-label="Show password"
                            data-target="login-password"></button>
                    </div>
                    <span class="field-error" id="login-password-error"></span>
                </div>

                <button type="submit" class="btn-primary">
                    <span class="btn-text">Login</span>
                    <span class="btn-loader" hidden></span>
                </button>

                <p class="auth-switch">
                    Don't have an account?
                    <button type="button" class="link-btn" data-show="register-form">Register</button>
                </p>
            </form>

            <!-- Register Form -->
            <form class="auth-form" id="register-form" novalidate hidden>
                <h1>Register</h1>
                <p class="auth-subtitle">Create your account to get started.</p>

                <div class="field-group">
                    <label for="register-name">Name</label>
                    <input id="register-name" name="name" type="text" placeholder="Enter your name"
                        autocomplete="name" required minlength="2">
                    <span class="field-error" id="register-name-error"></span>
                </div>

                <div class="field-group">
                    <label for="register-email">Email</label>
                    <input id="register-email" name="email" type="email" placeholder="Enter your email"
                        autocomplete="email" required>
                    <span class="field-error" id="register-email-error"></span>
                </div>

                <div class="field-group">
                    <label for="register-password">Password</label>
                    <div class="password-field">
                        <input id="register-password" name="password" type="password"
                            placeholder="Create a password" autocomplete="new-password" required minlength="6">
                        <button type="button" class="toggle-password" aria-label="Show password"
                            data-target="register-password"></button>
                    </div>
                    <span class="field-error" id="register-password-error"></span>
                </div>

                <div class="field-group">
                    <label for="register-confirm">Confirm Password</label>
                    <div class="password-field">
                        <input id="register-confirm" name="confirmPassword" type="password"
                            placeholder="Confirm your password" autocomplete="new-password" required>
                        <button type="button" class="toggle-password" aria-label="Show password"
                            data-target="register-confirm"></button>
                    </div>
                    <span class="field-error" id="register-confirm-error"></span>
                </div>

                <div class="field-group">
                    <label for="register-role">Role</label>
                    <select id="register-role" name="role" required>
                        <option value="" disabled selected>--Select Role--</option>
                        <option value="user">User</option>
                        <option value="admin">Admin</option>
                    </select>
                    <span class="field-error" id="register-role-error"></span>
                </div>

                <button type="submit" class="btn-primary">
                    <span class="btn-text">Register</span>
                    <span class="btn-loader" hidden></span>
                </button>

                <p class="auth-switch">
                    Already have an account?
                    <button type="button" class="link-btn" data-show="login-form">Login</button>
                </p>
            </form>
        </div>
    </main>

    <script src="app.js"></script>
</body>

</html>
