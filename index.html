<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auth App</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <main class="auth-container">
        <div class="auth-card">
            <!-- Login Form -->
            <form class="auth-form active" id="login-form" method="post" action="">
                <h1>Login</h1>
                <p class="auth-subtitle">Welcome back! Please sign in.</p>

                <div class="field-group">
                    <label for="login-email">Email</label>
                    <input id="login-email" name="email" type="email" placeholder="Enter your email"
                        autocomplete="email" required>
                </div>

                <div class="field-group">
                    <label for="login-password">Password</label>
                    <input id="login-password" name="password" type="password" placeholder="Enter your password"
                        autocomplete="current-password" required>
                </div>

                <button type="submit" class="btn-primary">Login</button>

                <p class="auth-switch">
                    Don't have an account?
                    <button type="button" class="link-btn" data-show="register-form">Register</button>
                </p>
            </form>

            <!-- Register Form -->
            <form class="auth-form" id="register-form" method="post" action="" hidden>
                <h1>Register</h1>
                <p class="auth-subtitle">Create your account to get started.</p>

                <div class="field-group">
                    <label for="register-name">Name</label>
                    <input id="register-name" name="name" type="text" placeholder="Enter your name"
                        autocomplete="name" required>
                </div>

                <div class="field-group">
                    <label for="register-email">Email</label>
                    <input id="register-email" name="email" type="email" placeholder="Enter your email"
                        autocomplete="email" required>
                </div>

                <div class="field-group">
                    <label for="register-password">Password</label>
                    <input id="register-password" name="password" type="password" placeholder="Create a password"
                        autocomplete="new-password" required>
                </div>

                <div class="field-group">
                    <label for="register-confirm">Confirm Password</label>
                    <input id="register-confirm" name="confirm_password" type="password"
                        placeholder="Confirm your password" autocomplete="new-password" required>
                </div>

                <div class="field-group">
                    <label for="register-role">Role</label>
                    <select id="register-role" name="role" required>
                        <option value="" disabled selected>--Select Role--</option>
                        <option value="user">User</option>
                        <option value="admin">Admin</option>
                    </select>
                </div>

                <button type="submit" class="btn-primary">Register</button>

                <p class="auth-switch">
                    Already have an account?
                    <button type="button" class="link-btn" data-show="login-form">Login</button>
                </p>
            </form>
        </div>
    </main>

    <script src="app.js"></script>
</body>

</html>
